# SonarQube / SonarCloud project configuration for PR_Repair.
#
# REQUIRED before analysis produces results — these are Unknown here and MUST be
# filled in (do not guess). Get them from your SonarCloud/SonarQube project:
sonar.projectKey=UNKNOWN_SET_YOUR_SONAR_PROJECT_KEY
sonar.organization=UNKNOWN_SET_YOUR_SONAR_ORGANIZATION
# For SonarCloud, uncomment:
# sonar.host.url=https://sonarcloud.io
# For self-hosted SonarQube, provide SONAR_HOST_URL via CI env/variable instead.

sonar.projectName=PR_Repair
sonar.sources=src
sonar.tests=tests
sonar.python.version=3.11,3.12

# Coverage produced by the pr-checks `quality` job (coverage.xml).
sonar.python.coverage.reportPaths=coverage.xml

# Exclude compatibility shims / generated / vendored paths from analysis.
sonar.exclusions=**/__pycache__/**,runtime/**,artifacts/**,router-shim/node_modules/**
sonar.coverage.exclusions=tests/**,router-shim/**
sonar.sourceEncoding=UTF-8
