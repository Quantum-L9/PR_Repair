# --- L9_META ---
# origin: l9-pr-repair-actuation
# layer: [ci, actuation]
# tags: [pr-repair, pull-request-review, dry-run-default]
# owner: platform
# status: active
# --- /L9_META ---
#
# GitHub-Action-native PR repair actuation (Option A).
#
# Trigger: a code-review tool (or human) submits a review on a PR. The bot first
# normalizes that review into the canonical agent_review_payload.json via the
# repo-owned entrypoint (`pr-repair ingest-review`), then runs the deterministic
# repair pipeline (`pr-repair run`) against it. There is no dependency on a
# pre-existing upstream payload.
#
# DATA FLOW:
#   review event ($GITHUB_EVENT_PATH)
#     -> pr-repair ingest-review  (detect tool -> fetch its unresolved threads
#                                   via the GitHub API -> normalize -> validate)
#     -> artifacts/agent_review_payload.json
#     -> pr-repair run            (deterministic actuation over the payload)
#
# INGEST EXIT CONTRACT:
#   0 -> payload produced      (downstream actuation runs)
#   3 -> skipped               (no PR / no recognized review tool: skip cleanly)
#   1 -> normalization failed  (review existed but is malformed: block downstream)
#
# SAFETY MODEL — every write gate is OFF by default:
#   * mode          = dry_run   (no mutation) unless vars.PR_REPAIR_MODE overrides
#   * post_comment  = 0         (no PR comments) unless vars.PR_REPAIR_POST_COMMENT=1
#   * allow_push    = 0         (HARDCODED off here — the workflow can never push;
#                                pushing requires a deliberate workflow edit)
#   * master switch = the repo variable PR_REPAIR_ENABLED must equal 'true', else
#                     the job is skipped entirely (opt-in, not opt-out).
#   * fork guard    = same-repo PRs only. Fork PRs never receive repository
#                     secrets and must never trigger writes against untrusted code.
#
# REQUIRED / OPTIONAL configuration:
#   secrets.GITHUB_TOKEN            provided automatically by Actions (no setup).
#   vars.PR_REPAIR_ENABLED         'true' to arm the job (default: unset -> skip).
#   vars.PR_REPAIR_MODE            'dry_run' (default) | repair_and_verify | ...
#   vars.PR_REPAIR_POST_COMMENT    '1' to let the bot reply on threads. NOTE: this
#                                  also requires bumping `pull-requests: write`
#                                  below; left at read as the least-privilege default.
#   vars.PR_REPAIR_WRITE_CEILING   tier ceiling for mutations (default: t1).
#
# FAILURE BEHAVIOR: advisory. The pipeline fails closed (non-zero exit) on a
# missing/invalid payload, which surfaces as a failed check but performs no writes.

name: PR Repair (actuation)

on:
  pull_request_review:
    types: [submitted]

# Least-privilege. Read-only is sufficient for dry-run actuation. Enabling
# vars.PR_REPAIR_POST_COMMENT=1 additionally requires `pull-requests: write`.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-repair-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  actuate:
    name: Deterministic PR repair (dry-run by default)
    runs-on: ubuntu-latest
    # Guardrails: armed only by explicit repo variable, same-repo PRs only, and
    # not for bare "commented" reviews (no approve/request-changes signal).
    if: >-
      vars.PR_REPAIR_ENABLED == 'true'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.event.review.state != 'commented'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: uv pip install -e .

      - name: Normalize review into agent_review_payload.json
        id: ingest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          # Per-tool enable gate (evidence-based). Copilot's review-thread channel
          # is confirmed; CodeRabbit/Sonar/GitGuardian stay off until a repo
          # confirms their live shape and flips the matching variable. A detected
          # but not-enabled tool skips cleanly (exit 3). See docs/actuation/review_ingest.md.
          PR_FIX_TOOL_COPILOT: ${{ vars.PR_REPAIR_TOOL_COPILOT || '1' }}
          PR_FIX_TOOL_CODERABBIT: ${{ vars.PR_REPAIR_TOOL_CODERABBIT || '0' }}
          PR_FIX_TOOL_SONARCLOUD: ${{ vars.PR_REPAIR_TOOL_SONARCLOUD || '0' }}
          PR_FIX_TOOL_GITGUARDIAN: ${{ vars.PR_REPAIR_TOOL_GITGUARDIAN || '0' }}
        run: |
          # $GITHUB_EVENT_PATH is set automatically by Actions and points at the
          # pull_request_review event JSON. The entrypoint fetches the tool's
          # threads itself; no pre-existing payload is required.
          set +e
          uv run pr-repair ingest-review \
            --event-path "$GITHUB_EVENT_PATH" \
            --output artifacts/agent_review_payload.json
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "status=produced" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -eq 3 ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "::notice::No actionable review source on this event; skipping actuation cleanly."
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "::error::Review normalization failed (exit $rc); blocking downstream actuation."
            exit "$rc"
          fi

      - name: Run PR repair (dry-run, no writes by default)
        if: steps.ingest.outputs.status == 'produced'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_FIX_PAYLOAD_PATH: artifacts/agent_review_payload.json
          PR_FIX_MODE: ${{ vars.PR_REPAIR_MODE || 'dry_run' }}
          PR_FIX_POST_COMMENT: ${{ vars.PR_REPAIR_POST_COMMENT || '0' }}
          PR_FIX_WRITE_CEILING: ${{ vars.PR_REPAIR_WRITE_CEILING || 't1' }}
          # Hardcoded off: this workflow never pushes. Pushing is a deliberate,
          # reviewed workflow change, not a toggle.
          PR_FIX_ALLOW_PUSH: '0'
        run: |
          # Fail closed if the produced payload is somehow absent/empty: the
          # downstream bot must never run on a missing payload.
          test -s artifacts/agent_review_payload.json \
            || { echo "::error::expected payload is missing/empty"; exit 1; }
          uv run pr-repair run

      - name: Upload run artifacts
        if: always() && steps.ingest.outputs.status == 'produced'
        uses: actions/upload-artifact@v4
        with:
          name: pr-repair-runtime
          path: |
            runtime/pr_repair/
            artifacts/agent_review_payload.json
          if-no-files-found: ignore
